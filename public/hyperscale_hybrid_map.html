.mb{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 14px;background:transparent;color:#3a3e58;cursor:pointer;border:none;border-right:1px solid rgba(255,255,255,.07);transition:all .2s;white-space:nowrap}

.tb.lit{border-color:#ff4444;color:#ff4444;background:rgba(255,68,68,.1)}
#mstrip{position:fixed;top:52px;left:0;right:0;height:3px;z-index:299;transition:background .3s}

/* views */
.view{position:fixed;top:55px;left:0;right:0;bottom:0;display:none}
.view.on{display:block}

/* view 1 & 3: canvas */
#vhub,#vcross{background:#07080f;cursor:grab}
#vhub canvas,#vcross canvas{display:block;width:100%;height:100%}

/* view 2: layers — pure HTML scroll */
#vlayers{background:#07080f;overflow-y:auto;overflow-x:hidden}
#vlayers::-webkit-scrollbar{width:4px}
#vlayers::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.lpage{max-width:760px;margin:0 auto;padding:44px 36px 100px}
.lpage-title{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#1e2035;margin-bottom:28px;display:block}
.lrow{display:flex;gap:0;margin-bottom:0}
.lspine{width:44px;flex-shrink:0;display:flex;flex-direction:column;align-items:center}
.lletter{width:34px;height:34px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;z-index:1;position:relative;flex-shrink:0}
.lline{flex:1;width:1px;margin:0 auto}
.lconnector{height:22px;display:flex;align-items:center;justify-content:center;margin-left:21px}

.lconnector-arrow{position:absolute;bottom:-5px;left:-4px;color:rgba(255,255,255,.1);font-size:9px}
.lcard{flex:1;margin-left:14px;margin-bottom:6px;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:15px 17px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}

.lcard.exp{border-color:rgba(255,255,255,.18)!important}
.lcard-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:8px 0 0 8px}
.lcard-head{display:flex;gap:10px;align-items:flex-start}
.lcard-name{font-size:13px;font-weight:600;margin-bottom:4px;line-height:1.3}
.lcard-desc{font-size:11px;color:#5a5e78;line-height:1.6}
.lcard-actors{display:flex;gap:5px;flex-wrap:wrap;margin-left:auto;flex-shrink:0;align-items:flex-start}
.achip{font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 7px;border-radius:3px;white-space:nowrap}
.lnodes{margin-top:13px;padding-top:13px;border-top:1px solid rgba(255,255,255,.05);display:none;flex-wrap:wrap;gap:5px}
.lnodes.op{display:flex}
.lnode{font-size:10px;color:#3a3e58;border:1px solid rgba(255,255,255,.06);padding:4px 9px;border-radius:3px}
.lwhy{margin-top:10px;font-size:11px;color:#4a4e68;line-height:1.6;font-style:italic;display:none}
.lwhy.op{display:block}

#panel.op{right:0}
#ph{padding:18px 22px 14px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;position:relative}
#pt{font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;display:block;margin-bottom:6px}
#pn{font-size:15px;font-weight:700;line-height:1.35}
#ps{font-size:12px;color:#5a5e78;margin-top:5px;line-height:1.55}
#pc{position:absolute;top:14px;right:18px;width:26px;height:26px;border:1px solid rgba(255,255,255,.1);border-radius:4px;background:transparent;color:#4a4e68;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
#pc:hover{color:#e8e9f0;border-color:rgba(255,255,255,.3)}
#pb{flex:1;overflow-y:auto;padding:18px 22px}
#pb::-webkit-scrollbar{width:3px}
#pb::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.ss{margin-bottom:18px}
.sl{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#1e2035;display:block;margin-bottom:7px}
.sp{font-size:12px;color:#5a5e78;line-height:1.65}

.iv{color:#5a5e78;line-height:1.55}
.tgs{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
.tg{font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 7px;border-radius:3px}

.dc::before{content:'▸';flex-shrink:0;color:#1e2035}
.li{font-size:11px;color:rgba(255,80,80,.75);padding:5px 0;border-bottom:1px solid rgba(255,68,68,.07);display:flex;gap:6px;line-height:1.5}

.ld{color:#ff4444;flex-shrink:0}
.qi{font-size:11px;color:rgba(255,195,60,.8);padding:5px 0;border-bottom:1px solid rgba(255,195,60,.06);display:flex;gap:5px;line-height:1.5}
.qi:last-child{border-bottom:none}
.qm{color:rgba(255,195,60,.45);flex-shrink:0;font-weight:700}

#legend{position:fixed;left:16px;bottom:16px;z-index:200;background:rgba(9,10,24,.95);border:1px solid rgba(255,255,255,.06);border-radius:6px;padding:12px 14px}

.lc{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.ll{width:16px;height:1.5px;flex-shrink:0}

.zbt{width:30px;height:30px;border:1px solid rgba(255,255,255,.1);border-radius:4px;background:rgba(9,10,24,.9);color:#4a4e68;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

#hint{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#1a1d30;pointer-events:none;transition:opacity 1s;z-index:100;white-space:nowrap}
</style>

// CANVASES

function fit(cv){const d=D();cv.width=cv.offsetWidth*d;cv.height=cv.offsetHeight*d;cv.style.width=cv.offsetWidth+'px';cv.style.height=cv.offsetHeight+'px';}
function resAll(){fit(c1);fit(c2);}

// GEOMETRY
const OR=195,SD=95,HR=44,SR=33,SUB=19;
function ha(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a+')';}
function sXY(ang){const r=(ang-90)*Math.PI/180;return[Math.cos(r)*OR,Math.sin(r)*OR];}
function snXY(sec,i){const n=sec.subs.length,b=(sec.angle-90)*Math.PI/180,off=(i-(n-1)/2)*0.42,d=OR+SD+Math.abs(i-(n-1)/2)*8;return[Math.cos(b+off)*d,Math.sin(b+off)*d];}
function ts(cv,wx,wy,px,py,sc){const d=D();return[cv.width/2+(wx+px)*sc*d,cv.height/2+(wy+py)*sc*d];}

// DRAW HELPERS
function dc(ctx,cv,wx,wy,r,fill,stroke,sw,px,py,sc){const[x,y]=ts(cv,wx,wy,px,py,sc),d=D(),rs=r*sc*d;ctx.beginPath();ctx.arc(x,y,rs,0,Math.PI*2);if(fill){ctx.fillStyle=fill;ctx.fill();}if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw*d;ctx.stroke();}}
function dl(ctx,cv,x1,y1,x2,y2,col,w,dash,px,py,sc){const[ax,ay]=ts(cv,x1,y1,px,py,sc),[bx,by]=ts(cv,x2,y2,px,py,sc),d=D();ctx.beginPath();ctx.setLineDash(dash?[5*sc*d,4*sc*d]:[]);ctx.strokeStyle=col;ctx.lineWidth=w*sc*d;ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();ctx.setLineDash([]);}
function dt(ctx,cv,text,wx,wy,dy,sz,col,align,bold,px,py,sc){const[x,y]=ts(cv,wx,wy,px,py,sc),d=D();ctx.fillStyle=col;ctx.font=(bold?'700':'400')+' '+(sz*sc*d)+'px Inter,-apple-system,sans-serif';ctx.textAlign=align||'center';ctx.textBaseline='middle';text.split('\n').forEach((ln,i,a)=>{ctx.fillText(ln,x,y+dy*sc*d+(i-(a.length-1)/2)*(sz+2.5)*sc*d);});}
function de(ctx,cv,e,wx,wy,dy,sz,px,py,sc){const[x,y]=ts(cv,wx,wy,px,py,sc),d=D();ctx.font=(sz*sc*d)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(e,x,y+dy*sc*d);}
function dtag(ctx,cv,text,wx,wy,cls,px,py,sc){const[x,y]=ts(cv,wx,wy,px,py,sc),d=D(),rs=(SUB+4)*sc*d,tx=x+rs*.6,ty=y-rs*.65,w=22*sc*d,h=10*sc*d;const m={'tg-c':['rgba(255,68,68,.22)','#ff7070'],'tg-p':['rgba(76,178,76,.22)','#6ed06e'],'tg-r':['rgba(200,150,50,.22)','#d4a040'],'tg-t':['rgba(100,140,210,.22)','#80a8e8']};const[bg,fg]=(m[cls]||['rgba(100,100,100,.2)','#aaa']);ctx.fillStyle=bg;ctx.beginPath();ctx.rect(tx-w/2,ty-h/2,w,h);ctx.fill();ctx.font='700 '+(7*sc*d)+'px Inter,sans-serif';ctx.fillStyle=fg;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,tx,ty);}

// HIT TEST
function hit(cv,mx,my,px,py,sc){const d=D(),[hx,hy]=ts(cv,0,0,px,py,sc);if(Math.hypot(mx*d-hx,my*d-hy)<HR*sc*d*1.2)return{type:'hub'};if(actSec){for(let i=0;i<actSec.subs.length;i++){const[sx,sy]=snXY(actSec,i),[px2,py2]=ts(cv,sx,sy,px,py,sc);if(Math.hypot(mx*d-px2,my*d-py2)<SUB*sc*d*1.8)return{type:'sub',sector:actSec,sub:actSec.subs[i]};}}for(const sec of S){const[sx,sy]=sXY(sec.angle),[px2,py2]=ts(cv,sx,sy,px,py,sc);if(Math.hypot(mx*d-px2,my*d-py2)<SR*sc*d*1.5)return{type:'sector',sector:sec};}return null;}

// DRAW CANVAS (shared, badges flag for cross mode)
function drawCV(ctx,cv,px,py,sc,badges,hov){
  const d=D();ctx.clearRect(0,0,cv.width,cv.height);
  // grid
  ctx.strokeStyle='rgba(255,255,255,0.013)';ctx.lineWidth=1;
  const gs=60*sc*d,ox=(cv.width/2+px*sc*d)%gs,oy=(cv.height/2+py*sc*d)%gs;
  for(let x=ox-gs;x<cv.width+gs;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,cv.height);ctx.stroke();}
  for(let y=oy-gs;y<cv.height+gs;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cv.width,y);ctx.stroke();}
  // lit
  if(litOn)LP.forEach(([a,b])=>{const sa=S.find(s=>s.id===a),sb=S.find(s=>s.id===b);const[ax,ay]=sXY(sa.angle),[bx,by]=sXY(sb.angle);dl(ctx,cv,ax,ay,bx,by,'rgba(255,68,68,0.38)',1.2,true,px,py,sc);});
  // cross arcs
  if(badges&&actSec)(actSec.lc||[]).forEach(item=>{const lay=L.find(l=>l.id===item.l);if(!lay)return;const[sx,sy]=sXY(actSec.angle),[spx,spy]=ts(cv,sx,sy,px,py,sc),ang=(actSec.angle-90)*Math.PI/180;ctx.beginPath();ctx.arc(spx,spy,62*sc*d,ang-1.1,ang+1.1);ctx.strokeStyle=ha(lay.color,.45);ctx.lineWidth=1.5*d;ctx.setLineDash([4*sc*d,3*sc*d]);ctx.stroke();ctx.setLineDash([]);const lx=spx+Math.cos(ang)*98*sc*d,ly=spy+Math.sin(ang)*98*sc*d;ctx.font='700 '+(8*sc*d)+'px Inter,sans-serif';ctx.fillStyle=ha(lay.color,.65);ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('['+item.l+']',lx,ly);});
  // sub connections
  if(actSec){const[sx,sy]=sXY(actSec.angle);actSec.subs.forEach((_,i)=>{const[bx,by]=snXY(actSec,i);dl(ctx,cv,sx,sy,bx,by,ha(actSec.color,.2),1,false,px,py,sc);});}
  // spokes
  S.forEach(sec=>{const[sx,sy]=sXY(sec.angle);dl(ctx,cv,0,0,sx,sy,ha(sec.color,.28),1.4,false,px,py,sc);});
  // subs
  if(actSec)actSec.subs.forEach((sub,i)=>{const[bx,by]=snXY(actSec,i),isH=hov&&hov.type==='sub'&&hov.sub&&hov.sub.id===sub.id,r=isH?SUB*1.2:SUB;dc(ctx,cv,bx,by,r,ha(actSec.color,isH?.25:.1),ha(actSec.color,isH?.9:.45),1,px,py,sc);de(ctx,cv,sub.icon,bx,by,-2,11,px,py,sc);sub.label.split('\n').forEach((ln,li)=>dt(ctx,cv,ln,bx,by,(r+10)+li*11,7.5,'rgba(255,255,255,.48)','center',false,px,py,sc));dtag(ctx,cv,sub.tag,bx,by,sub.tc,px,py,sc);});
  // sectors
  S.forEach(sec=>{const[sx,sy]=sXY(sec.angle),isA=actSec&&actSec.id===sec.id,isH=hov&&hov.type==='sector'&&hov.sector&&hov.sector.id===sec.id,r=(isA||isH)?SR*1.14:SR;if(isA){const[spx,spy]=ts(cv,sx,sy,px,py,sc),g=ctx.createRadialGradient(spx,spy,0,spx,spy,r*2.5*sc*d);g.addColorStop(0,ha(sec.color,.14));g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(spx,spy,r*2.5*sc*d,0,Math.PI*2);ctx.fill();}dc(ctx,cv,sx,sy,r,ha(sec.color,isA?.22:.1),ha(sec.color,isA?1:.48),isA?2:1.5,px,py,sc);de(ctx,cv,sec.icon,sx,sy,-8,15,px,py,sc);sec.label.split('\n').forEach((ln,li)=>dt(ctx,cv,ln,sx,sy,9+li*10,8,isA?'#ffffff':'rgba(255,255,255,.72)','center',isA,px,py,sc));
  if(badges){const lay=L.find(l=>l.id===sec.pl);if(lay){const[spx,spy]=ts(cv,sx,sy,px,py,sc),bx=spx+r*sc*d*.72,by=spy-r*sc*d*.72,bw=16*sc*d,bh=12*sc*d;ctx.fillStyle=ha(lay.color,.4);ctx.beginPath();ctx.rect(bx-bw/2,by-bh/2,bw,bh);ctx.fill();ctx.font='700 '+(7.5*sc*d)+'px Inter,sans-serif';ctx.fillStyle=lay.color;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(sec.pl,bx,by);}}});
  // hub
  const isHH=hov&&hov.type==='hub',hR=isHH?HR*1.07:HR,[hpx,hpy]=ts(cv,0,0,px,py,sc),pulse=(Date.now()%3000)/3000;
  ctx.beginPath();ctx.arc(hpx,hpy,(hR+18+pulse*22)*sc*d,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,'+(0.05*(1-pulse))+')';ctx.lineWidth=1.5*d;ctx.stroke();
  dc(ctx,cv,0,0,hR,'rgba(255,255,255,.06)','rgba(255,255,255,.42)',2,px,py,sc);
  dt(ctx,cv,'HYPERSCALE',0,0,-9,7,'rgba(255,255,255,.9)','center',true,px,py,sc);
  dt(ctx,cv,'DATA CENTER',0,0,1,7,'rgba(255,255,255,.9)','center',true,px,py,sc);
  dt(ctx,cv,badges?'CROSS':'HUB',0,0,12,5.5,badges?'rgba(255,195,60,.5)':'rgba(255,255,255,.3)','center',false,px,py,sc);
}

// LOOP
function loop(){if(mode==='hub')drawCV(ctx1,c1,hPx,hPy,hSc,false,hHov);if(mode==='cross')drawCV(ctx2,c2,cPx,cPy,cSc,true,cHov);requestAnimationFrame(loop);}
loop();

// WIRE CANVAS
function wire(cv,gPx,sPx,gPy,sPy,gSc,sSc,gHov,sHov){
  let drag=false,moved=false,sx,sy,bpx,bpy;
  cv.addEventListener('mousedown',e=>{drag=true;moved=false;const r=cv.getBoundingClientRect();sx=e.clientX-r.left;sy=e.clientY-r.top;bpx=gPx();bpy=gPy();cv.style.cursor='grabbing';});
  window.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;if(drag){if(Math.hypot(mx-sx,my-sy)>4)moved=true;sPx(bpx+(mx-sx)/gSc());sPy(bpy+(my-sy)/gSc());}else{sHov(hit(cv,mx,my,gPx(),gPy(),gSc()));cv.style.cursor=gHov()?'pointer':'grab';}});
  window.addEventListener('mouseup',()=>{drag=false;cv.style.cursor='grab';});
  cv.addEventListener('click',e=>{if(moved)return;const r=cv.getBoundingClientRect(),h=hit(cv,e.clientX-r.left,e.clientY-r.top,gPx(),gPy(),gSc());if(!h){closeP();actSec=null;return;}if(h.type==='hub'){openHub();actSec=null;return;}if(h.type==='sector'){if(actSec&&actSec.id===h.sector.id){actSec=null;closeP();return;}actSec=h.sector;mode==='cross'?openCross(h.sector):openSec(h.sector);return;}if(h.type==='sub')openSub(h.sector,h.sub);});
  cv.addEventListener('wheel',e=>{e.preventDefault();sSc(Math.max(.2,Math.min(3,gSc()*(e.deltaY>0?.9:1.1))));},{passive:false});
}
wire(c1,()=>hPx,v=>{hPx=v},()=>hPy,v=>{hPy=v},()=>hSc,v=>{hSc=v},()=>hHov,v=>{hHov=v});
wire(c2,()=>cPx,v=>{cPx=v},()=>cPy,v=>{cPy=v},()=>cSc,v=>{cSc=v},()=>cHov,v=>{cHov=v});

// BUILD LAYERS VIEW
function buildLayers(){
  const el=document.getElementById('lc');el.innerHTML='';
  L.forEach((lay,i)=>{
    if(i>0){const conn=document.createElement('div');conn.className='lconnector';conn.innerHTML='<div class="lconnector-inner"><span class="lconnector-arrow">▾</span></div>';el.appendChild(conn);}
    const actors=lay.actors.map(aid=>S.find(s=>s.id===aid)).filter(Boolean);
    const row=document.createElement('div');row.className='lrow';
    const achips=actors.map(sec=>'<span class="achip" style="background:'+ha(sec.color,.15)+';color:'+sec.color+';border:1px solid '+ha(sec.color,.35)+'">'+sec.icon+' '+sec.id.toUpperCase()+'</span>').join('');
    const nchips=lay.nodes.map(n=>'<div class="lnode">'+n+'</div>').join('');
    row.innerHTML='<div class="lspine"><div class="lletter" style="background:'+ha(lay.color,.18)+';color:'+lay.color+'">'+lay.id+'</div><div class="lline" style="background:'+ha(lay.color,.15)+'"></div></div><div class="lcard" id="lc-'+lay.id+'"><div class="lcard-bar" style="background:'+lay.color+'"></div><div class="lcard-head"><div style="flex:1"><div class="lcard-name" style="color:'+lay.color+'">'+lay.label+'</div><div class="lcard-desc">'+lay.desc+'</div></div><div class="lcard-actors">'+achips+'</div></div><div class="lnodes" id="ln-'+lay.id+'">'+nchips+'</div><div class="lwhy" id="lw-'+lay.id+'">'+lay.why+'</div></div>';
    row.querySelector('.lcard').addEventListener('click',function(){
      const isExp=this.classList.contains('exp');
      document.querySelectorAll('.lcard').forEach(c=>c.classList.remove('exp'));
      document.querySelectorAll('.lnodes,.lwhy').forEach(n=>{n.classList.remove('op');});
      if(!isExp){this.classList.add('exp');document.getElementById('ln-'+lay.id).classList.add('op');document.getElementById('lw-'+lay.id).classList.add('op');openLayer(lay);}else closeP();
    });
    el.appendChild(row);
  });
}
buildLayers();

// MODE SWITCHING
const STRIP={hub:'rgba(108,142,191,.5)',layers:'rgba(106,170,106,.5)',cross:'rgba(255,195,60,.4)'};
function setMode(m){
  mode=m;actSec=null;closeP();
  ['hub','layers','cross'].forEach((id,i)=>{
    document.getElementById('v'+id).style.display=id===m?'block':'none';
    document.getElementById('b'+(i+1)).classList.toggle('on',id===m);
  });
  document.getElementById('mstrip').style.background=STRIP[m]||'transparent';
  document.getElementById('zb').style.display=m==='layers'?'none':'flex';
  updLegend(m);
  if(m==='hub')setTimeout(()=>fit(c1),10);
  if(m==='cross')setTimeout(()=>fit(c2),10);
}

// init view display
document.getElementById('vhub').style.display='block';
document.getElementById('vlayers').style.display='none';
document.getElementById('vcross').style.display='none';

function updLegend(m){
  const t=document.getElementById('lgh'),b=document.getElementById('lgb');
  if(m==='hub'){t.textContent='Hub & Spoke';b.innerHTML='<div class="leg"><div class="lc" style="background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.45)"></div>Hub</div><div class="leg"><div class="lc" style="background:rgba(108,142,191,.2);border:1.5px solid rgba(108,142,191,.6)"></div>Sector</div><div class="leg"><div class="lc" style="width:9px;height:9px;background:rgba(108,142,191,.12);border:1px solid rgba(108,142,191,.5)"></div>Sub-node</div><div class="leg"><div class="ll" style="background:rgba(255,255,255,.2)"></div>Spoke</div><div class="leg"><div class="ld2"></div>Litigation</div><div class="lsep"></div><div class="leg"><span style="font-size:8px;background:rgba(255,68,68,.15);color:#ff7070;padding:1px 5px;border-radius:2px;font-weight:700">CONF</span>Confidential</div><div class="leg"><span style="font-size:8px;background:rgba(76,178,76,.15);color:#6ed06e;padding:1px 5px;border-radius:2px;font-weight:700">PUB</span>Public</div><div class="leg"><span style="font-size:8px;background:rgba(200,150,50,.15);color:#d4a040;padding:1px 5px;border-radius:2px;font-weight:700">PRIV</span>Private</div>';}
  else if(m==='layers'){t.textContent='A–H Layers';b.innerHTML=L.map(l=>'<div class="leg"><div class="lc" style="background:'+ha(l.color,.25)+';border:1.5px solid '+ha(l.color,.7)+'"></div>'+l.id+': '+l.label+'</div>').join('');}
  else{t.textContent='Cross-Section';b.innerHTML='<p style="font-size:9px;color:#3a3e58;line-height:1.6;margin-bottom:8px">Each sector shows its primary layer badge. Click a sector to see all its layer connections.</p>'+L.map(l=>'<div class="leg"><div class="lc" style="background:'+ha(l.color,.25)+';border:1.5px solid '+ha(l.color,.7)+'"></div>'+l.id+': '+l.label+'</div>').join('');}
}

function toggleLit(){litOn=!litOn;document.getElementById('litbtn').classList.toggle('lit',litOn);}
function resetView(){hSc=1;hPx=0;hPy=0;cSc=1;cPx=0;cPy=0;actSec=null;closeP();}
function za(f){if(mode==='hub')hSc=Math.max(.2,Math.min(3,hSc*f));if(mode==='cross')cSc=Math.max(.2,Math.min(3,cSc*f));}

// PANELS
function ps(id,val,col){const e=document.getElementById(id);e.textContent=val;e.style.color=col||'';}
function closeP(){document.getElementById('panel').classList.remove('op');}
function openP(){document.getElementById('panel').classList.add('op');}

function tagsHTML(tags,pre){return tags.map(t=>'<span class="tg '+pre+t+'">'+(t==='c'?'CONF':t==='p'?'PUB':t==='r'?'PRIV':'PART')+'</span>').join('');}
function docsHTML(docs){return docs.map(d=>'<div class="dc">'+d+'</div>').join('');}
function litHTML(items){return items.map(l=>'<div class="li"><span class="ld">⬤</span>'+l+'</div>').join('');}
function qHTML(items){return items.map(q=>'<div class="qi"><span class="qm">?</span>'+q+'</div>').join('');}

function openHub(){
  ps('pt','HYBRID INTELLIGENCE MAP','rgba(255,255,255,.25)');
  ps('pn','Hyperscale Data Center Hub');
  ps('ps','Three genuinely different views. Switch in the toolbar.');
  document.getElementById('pb').innerHTML='<div class="ss"><span class="sl">Three views</span><div class="ir"><div class="ik" style="color:#6c8ebf">① Hub & Spoke</div><div class="iv">Dark canvas. 10 sectors radiate from hub. Click a sector to expand 4 sub-nodes. Full intelligence brief for each actor.</div></div><div class="ir"><div class="ik" style="color:#6aaa6a">② Control Layers</div><div class="iv">A scrollable document — 8 colored layer cards stacked top to bottom. Completely different visual. Click any card to expand its node inventory and open the brief.</div></div><div class="ir"><div class="ik" style="color:#e8c060">③ Cross-Section</div><div class="iv">Hub-and-spoke returns but with layer badges on every sector node. Click any sector to see exactly which A–H layers it connects to and how.</div></div></div><div class="ss"><span class="sl">Core finding</span><p class="sp">A hyperscale data center is not one contract. It is a fragmented network of decisions across 10 sectors and 8 control layers — each with its own timeline, authority, and transparency level.</p><p class="sp" style="margin-top:10px;color:rgba(255,195,60,.85);font-style:italic">"After tax benefits, water, electricity, infrastructure, environmental effects and permanent employment are combined — is this project actually in the public interest?"</p></div>';
  openP();
}

function openSec(sec){
  const lay=L.find(l=>l.id===sec.pl);
  ps('pt',sec.label.replace('\n',' / ').toUpperCase(),sec.color);
  ps('pn',sec.label.replace('\n',' / '));
  ps('ps',sec.icon+'  Primary layer: ['+sec.pl+'] '+(lay?lay.label:'')+' · '+sec.transp);
  document.getElementById('pb').innerHTML='<div class="ss"><span class="sl">Controls</span><p class="sp">'+sec.controls+'</p></div><div class="ss"><span class="sl">Wants</span><p class="sp">'+sec.wants+'</p></div><div class="ss"><span class="sl">Provides</span><p class="sp">'+sec.provides+'</p></div><div class="ss"><span class="sl">Receives</span><p class="sp">'+sec.receives+'</p></div><div class="ss"><span class="sl">Risk tags</span><div class="tgs">'+sec.risks.map(r=>'<span class="tg tg-risk">'+r+'</span>').join('')+'</div></div><div class="ss"><span class="sl">Key documents</span>'+docsHTML(sec.docs)+'</div><div class="ss"><span class="sl">Litigation exposure</span>'+litHTML(sec.lit)+'</div><div class="ss"><span class="sl">Public-interest questions</span>'+qHTML(sec.qs)+'</div>';
  openP();
}

function openSub(sec,sub){
  ps('pt',sec.label.replace('\n',' ').toUpperCase()+' › '+sub.label.replace('\n',' '),sec.color);
  ps('pn',sub.label.replace('\n',' '));
  ps('ps',sub.detail);
  document.getElementById('pb').innerHTML='<div class="ss"><span class="sl">Transparency</span><div class="tgs"><span class="tg '+sub.tc+'">'+sub.tag+'</span></div></div><div class="ss"><span class="sl">Sector context</span><div class="ir"><div class="ik">Controls</div><div class="iv">'+sec.controls+'</div></div><div class="ir"><div class="ik">Wants</div><div class="iv">'+sec.wants+'</div></div></div><div class="ss"><span class="sl">Litigation exposure</span>'+litHTML(sec.lit)+'</div><div class="ss"><span class="sl">Public-interest questions</span>'+qHTML(sec.qs)+'</div>';
  openP();
}

function openCross(sec){
  const lay=L.find(l=>l.id===sec.pl);
  ps('pt','CROSS-SECTION · '+sec.label.replace('\n',' / ').toUpperCase(),sec.color);
  ps('pn',sec.label.replace('\n',' / ')+' — Layer Connections');
  ps('ps','Primary layer: ['+sec.pl+'] '+(lay?lay.label:''));
  const conns=(sec.lc||[]).map(function(item){const layer=L.find(function(l){return l.id===item.l;});return '<div class="lci"><span class="lcl" style="color:'+(layer?layer.color:'#666')+'">['+item.l+'] '+(layer?layer.label:item.l)+'</span><span class="lch">'+item.h+'</span></div>';}).join('');
  document.getElementById('pb').innerHTML='<div class="ss"><span class="sl">How this sector connects across the A–H layers</span>'+conns+'</div><div class="ss"><span class="sl">Sector detail</span><div class="ir"><div class="ik">Controls</div><div class="iv">'+sec.controls+'</div></div><div class="ir"><div class="ik">Wants</div><div class="iv">'+sec.wants+'</div></div></div><div class="ss"><span class="sl">Litigation exposure</span>'+litHTML(sec.lit)+'</div><div class="ss"><span class="sl">Public-interest questions</span>'+qHTML(sec.qs)+'</div>';
  openP();
}

function openLayer(lay){
  ps('pt','CONTROL LAYER '+lay.id,lay.color);
  ps('pn','['+lay.id+'] '+lay.label);
  ps('ps',lay.desc);
  const actors=lay.actors.map(function(aid){return S.find(function(s){return s.id===aid;});}).filter(Boolean);
  document.getElementById('pb').innerHTML='<div class="ss"><span class="sl">Why this layer matters</span><p class="sp">'+lay.why+'</p></div><div class="ss"><span class="sl">What it controls</span><p class="sp">'+lay.desc+'</p></div><div class="ss"><span class="sl">Primary sector actors</span>'+actors.map(function(sec){return '<div class="ir"><div class="ik" style="color:'+sec.color+'">'+sec.icon+' '+sec.id.toUpperCase()+'</div><div class="iv">'+sec.label.replace('\n',' ')+' — '+sec.controls.slice(0,90)+'…</div></div>';}).join('')+'</div><div class="ss"><span class="sl">Key nodes and documents</span>'+docsHTML(lay.nodes)+'</div>';
  openP();
}

updLegend('hub');
setTimeout(openHub,400);
setTimeout(function(){document.getElementById('hint').style.opacity='0';},5000);

</script>
